<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时雨 · KALEIDO Bubble</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0c0c10, #050508); min-height: 100vh; color: #e0e0e0; }
        .back-btn { position: fixed; top: 20px; left: 20px; background: #1e1e2a; border: none; padding: 10px 18px; border-radius: 50px; color: white; cursor: pointer; z-index: 100; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .back-btn:hover { background: #7c3aed; }
        .api-settings { position: fixed; top: 20px; right: 20px; background: #1e1e2a; border: none; padding: 10px 18px; border-radius: 50px; color: white; cursor: pointer; z-index: 100; font-size: 14px; }
        .api-settings:hover { background: #3a3a4a; }
        .chat-container { max-width: 700px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; padding: 80px 20px 20px; }
        .chat-header { text-align: center; padding: 20px; border-bottom: 1px solid #2a2a35; margin-bottom: 20px; }
        .chat-header h1 { font-size: 2rem; background: linear-gradient(135deg, #fff, #f9a8d4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .chat-header p { color: #888; font-size: 0.8rem; margin-top: 5px; }
        .chat-messages { flex: 1; overflow-y: auto; padding-right: 8px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 1rem; }
        .msg { display: flex; gap: 12px; align-items: flex-start; }
        .msg-bubble { background: #1c1c24; padding: 0.75rem 1rem; border-radius: 22px; max-width: 80%; color: #f0f0f0; font-size: 0.9rem; line-height: 1.4; }
        .msg-bubble.me { background: #7c3aed; color: white; margin-left: auto; border-radius: 22px 22px 4px 22px; }
        .chat-input-area { display: flex; gap: 10px; padding: 10px; background: #0f0f14; border-radius: 60px; border: 1px solid #2a2a35; margin-top: 10px; }
        .chat-input-area input { flex: 1; padding: 0.9rem 1rem; border-radius: 50px; border: none; background: #20202a; color: white; outline: none; font-size: 0.9rem; }
        .chat-input-area input::placeholder { color: #666; }
        .chat-input-area button { background: #7c3aed; border: none; padding: 0 1.5rem; border-radius: 50px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .chat-input-area button:hover { background: #6d28d9; }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .action-btn { background: #1e1e2a; border: none; padding: 8px 16px; border-radius: 50px; color: #aaa; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .action-btn:hover { background: #2a2a35; color: white; }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #1a1a24; }
        .chat-messages::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 5px; }
        @media (max-width: 600px) { .chat-container { padding: 70px 15px 15px; } .msg-bubble { max-width: 90%; } }
    </style>
</head>
<body>
<a href="../index.html#bubble" class="back-btn"><i class="fas fa-arrow-left"></i> 返回主页</a>
<button class="api-settings" onclick="resetApiKey()"><i class="fas fa-key"></i> 设置API Key</button>

<div class="chat-container">
    <div class="chat-header">
        <h1>🍑 时雨</h1>
        <p>💬 与 SHI YU 的聊天室 · 请发送消息吧</p>
        <div style="font-size: 0.7rem; margin-top: 8px;" id="apiStatus">🔌 检查连接中...</div>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="msg"><div class="msg-bubble">🌸 你好呀~ 我是时雨！今天也想和你聊聊天呢✨</div></div>
    </div>
    
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="给时雨发消息吧 💬" autocomplete="off">
        <button id="sendBtn"><i class="fas fa-paper-plane"></i> 发送</button>
    </div>
    
    <div class="action-buttons">
        <button class="action-btn" onclick="clearHistory('时雨')"><i class="fas fa-trash-alt"></i> 清空聊天记录</button>
    </div>
</div>

<script src="../js/bubble-common.js"></script>
<script>
    const MEMBER_NAME = '时雨';
    
    document.addEventListener('DOMContentLoaded', function() {
        initBubblePage(MEMBER_NAME);
        
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('chatInput');
        
        sendBtn.addEventListener('click', function() {
            sendMessage(MEMBER_NAME);
        });
        
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage(MEMBER_NAME);
            }
        });
    });
</script>
</body>
</html>
