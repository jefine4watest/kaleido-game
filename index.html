<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KALEIDO · 万花筒男团</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            scroll-behavior: smooth;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(12px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        section {
            padding: 100px 5% 80px;
        }

        .hero {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at 30% 10%, #1a1a2e, #050505);
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(to right, #fff, #c084fc, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 1rem;
        }

        .tagline {
            margin-top: 2rem;
            font-style: italic;
            color: #a78bfa;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .member-card {
            background: #111;
            border-radius: 28px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 30px -15px rgba(0, 0, 0, 0.5);
        }

        .member-card:hover {
            transform: translateY(-6px);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 25px 35px -12px rgba(168, 85, 247, 0.2);
        }

        .member-photo {
            height: 280px;
            background: linear-gradient(145deg, #1a1a24, #0a0a10);
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .photo-overlay {
            background: linear-gradient(to top, #000000cc, transparent);
            width: 100%;
            padding: 1rem;
            text-align: center;
        }

        .stage-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .member-info {
            padding: 1.5rem;
        }

        .position {
            color: #a855f7;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .sunshine-bio {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #bcbcbc;
            margin-top: 0.5rem;
        }

        .album-container {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            justify-content: center;
            margin-top: 3rem;
        }

        .album {
            background: #0e0e12;
            border-radius: 32px;
            max-width: 380px;
            padding: 1.8rem;
            border: 1px solid #2a2a35;
            transition: 0.2s;
        }

        .album:hover {
            border-color: #a855f7;
            transform: scale(1.01);
        }

        .album-cover {
            border-radius: 24px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 15px 20px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .cover-mirror {
            background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
            border: 1px solid #c084fc40;
        }

        .cover-findme {
            background: linear-gradient(145deg, #fff8e7, #f5e6c8);
            position: relative;
        }

        .day-night-split {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #ffd96666 0%, #ffd96666 50%, #1e2a5e66 50%, #1e2a5e66 100%);
            pointer-events: none;
        }

        .album-cover i {
            font-size: 3.8rem;
            margin-bottom: 0.8rem;
            z-index: 2;
        }

        .cover-mirror i {
            color: #c084fc;
        }

        .cover-findme i {
            color: #d97706;
            text-shadow: 0 0 6px #fbbf24;
        }

        .album-title {
            font-size: 1.7rem;
            font-weight: 700;
            text-align: center;
        }

        .visual-concept {
            font-size: 0.85rem;
            color: #d8b4fe;
            text-align: center;
            margin: 0.5rem 0 0.2rem;
        }

        .concept-desc {
            font-size: 0.8rem;
            color: #b9b9ce;
            text-align: center;
            margin-bottom: 1rem;
        }

        .tracklist {
            list-style: none;
            font-size: 0.85rem;
            margin: 1rem 0;
        }

        .tracklist li {
            padding: 0.3rem 0;
            border-bottom: 1px dashed #2c2c36;
            display: flex;
            gap: 0.6rem;
        }

        .bubble-section {
            background: linear-gradient(145deg, #0c0c10, #050508);
        }

        .bubble-members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .bubble-entry-card {
            background: #111;
            border-radius: 32px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .bubble-entry-card:hover {
            transform: translateY(-8px);
            border-color: #7c3aed;
            background: #1a1a24;
        }

        .bubble-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #1e1e2a, #0a0a10);
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .bubble-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .bubble-stage {
            font-size: 0.8rem;
            color: #a855f7;
            margin-bottom: 0.3rem;
        }

        .bubble-desc {
            font-size: 0.75rem;
            color: #888;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.75rem;
            border-top: 1px solid #1f1f28;
            color: #5a5a6e;
        }

        @media (max-width: 700px) {
            .hero h1 { font-size: 2.8rem; }
            .nav-links { gap: 1rem; }
            section { padding: 80px 5% 60px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">KALEIDO</div>
    <div class="nav-links">
        <a href="#home">HOME</a>
        <a href="#members">MEMBERS</a>
        <a href="#albums">ALBUMS</a>
        <a href="#bubble">BUBBLE</a>
    </div>
</nav>

<main>
    <section id="home" class="hero">
        <div>
            <h1>KALEIDO</h1>
            <p>万花筒中，遇见无限光影</p>
            <div class="tagline">✦ 2025 全新篇章《FIND REAL ME》即将到来 ✦</div>
        </div>
    </section>

    <section id="members">
        <h2 style="font-size: 2rem; margin-bottom: 1rem;">MEET ✦ KALEIDO</h2>
        <p style="margin-bottom: 2rem; color: #aaa;">五色棱镜 · 折射温暖光芒</p>
        <div class="members-grid" id="membersGrid"></div>
    </section>

    <section id="albums" style="background: #07070c;">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">DISCOGRAPHY</h2>
        <p style="margin-bottom: 2rem;">视觉概念 · 日夜交织的灵魂回响</p>
        <div class="album-container" id="albumList"></div>
    </section>

    <section id="bubble" class="bubble-section">
        <h2 style="font-size: 2rem; text-align: center;">✨ BUBBLE ✨</h2>
        <p style="text-align: center; margin-bottom: 2rem;">点击成员头像，进入1:1私密聊天室</p>
        <div class="bubble-members-grid" id="bubbleMembersGrid"></div>
    </section>
</main>

<footer>
    <p>© 2025 KALEIDO Entertainment. 万花筒中，万物皆有光。</p>
</footer>

<script>
    // 成员数据
    const membersData = [
        { name: "时雨", stageName: "SHI YU", position: "视觉中心 · 副唱", bio: "来自南方的蜜桃少年，拥有宝石般闪耀的舞台表现力。温柔细腻，喜欢分享日常的小确幸，是团队里的治愈担当。", photoIcon: "fas fa-candy-cane", color: "#f9a8d4" },
        { name: "林安", stageName: "LIN AN", position: "主唱 · 暖心大哥", bio: "嗓音如春风化雨，永远是成员最坚实的依靠。热爱音乐与生活，私下喜欢烹饪和弹吉他，带给粉丝无限温暖。", photoIcon: "fas fa-dove", color: "#a7f3d0" },
        { name: "Jayden", stageName: "JAYDEN", position: "主舞 · 说唱", bio: "从街头到舞台，用汗水写就梦想。充满力量感的舞蹈和低音炮rap，私下却意外地喜欢小动物和星星。", photoIcon: "fas fa-star", color: "#fcd34d" },
        { name: "姜一辰", stageName: "JIANG YICHEN", position: "队长 · 领舞", bio: "完美主义的全能队长，永远把团队放在第一位。细腻坚韧，用行动诠释责任与热爱。", photoIcon: "fas fa-crown", color: "#94a3f8" },
        { name: "Seo Jin", stageName: "SEO JIN", position: "门面 · 副说唱", bio: "财阀家的小儿子，像漫画里走出的王子。单纯爱笑，正在努力提升实力，用真诚打动每一个人。", photoIcon: "fas fa-gem", color: "#fbcfe8" }
    ];

    // 专辑数据
    const albums = [
        {
            title: "MIRROR, MIRROR",
            release: "2024.04.01",
            visual: "破碎镜面 / 双重人格美学",
            conceptDesc: "主打歌〈两面〉以华丽黑暗与纯白光影对比，MV使用镜屋特效与幻象转场，视觉冲击力极强。",
            tracks: ["1. 两面", "2. 棱镜", "3. 你的谎言", "4. 万花筒", "5. I See You"],
            coverClass: "cover-mirror",
            icon: "fas fa-compass"
        },
        {
            title: "FIND REAL ME",
            release: "2025.02.14",
            visual: "☀️ 白天少年青春 / 🌙 晚上迷茫寻找方向",
            conceptDesc: "主打歌〈破晓之前〉描绘Z世代在阳光下的朝气与夜晚孤独中的自我拉扯。概念照分'日光版'与'午夜版'，日记本、空荡房间、凌晨街道的视觉语言直击心灵。",
            tracks: ["1. 破晓之前 ★ TITLE", "2. 白日梦游", "3. 凌晨三点的自白", "4. 未完成的信", "5. Find Real Me"],
            coverClass: "cover-findme",
            icon: "fas fa-sun"
        }
    ];

    // Bubble 成员入口
    const bubbleMembers = [
        { name: "时雨", stageName: "SHI YU", desc: "蜜桃少年 · 治愈系", icon: "fas fa-candy-cane", color: "#f9a8d4", file: "shiyu.html" },
        { name: "林安", stageName: "LIN AN", desc: "暖心大哥 · 温柔声线", icon: "fas fa-dove", color: "#a7f3d0", file: "linan.html" },
        { name: "Jayden", stageName: "JAYDEN", desc: "舞台王者 · 反转魅力", icon: "fas fa-star", color: "#fcd34d", file: "jayden.html" },
        { name: "姜一辰", stageName: "JIANG YICHEN", desc: "全能队长 · 完美主义", icon: "fas fa-crown", color: "#94a3f8", file: "jiangyichen.html" },
        { name: "Seo Jin", stageName: "SEO JIN", desc: "宝石门面 · 努力派", icon: "fas fa-gem", color: "#fbcfe8", file: "seojin.html" }
    ];

    // 渲染成员卡片
    function renderMembers() {
        const grid = document.getElementById('membersGrid');
        if (!grid) return;
        grid.innerHTML = membersData.map(m => `
            <div class="member-card">
                <div class="member-photo">
                    <div class="photo-overlay">
                        <i class="${m.photoIcon}" style="font-size: 3rem; color: ${m.color}; text-shadow: 0 0 6px ${m.color};"></i>
                    </div>
                </div>
                <div class="member-info">
                    <div class="stage-name">${m.stageName}</div>
                    <div class="position">${m.position}</div>
                    <div class="sunshine-bio">${m.bio}</div>
                </div>
            </div>
        `).join('');
    }

    // 渲染专辑
    function renderAlbums() {
        const container = document.getElementById('albumList');
        if (!container) return;
        container.innerHTML = albums.map(alb => {
            const specialEffect = alb.title === "FIND REAL ME" ? '<div class="day-night-split"></div>' : '';
            return `
            <div class="album">
                <div class="album-cover ${alb.coverClass}" style="position: relative;">
                    ${specialEffect}
                    <i class="${alb.icon}"></i>
                    <i class="fas fa-record-vinyl" style="font-size: 1.8rem; opacity: 0.7; margin-top: 4px;"></i>
                </div>
                <div class="album-title">${alb.title}</div>
                <div class="visual-concept">🎨 视觉 · ${alb.visual}</div>
                <div class="concept-desc">${alb.conceptDesc}</div>
                <ul class="tracklist">
                    ${alb.tracks.map(t => `<li><i class="fas fa-play" style="font-size: 0.6rem; align-self: center; color: #a855f7;"></i> ${t}</li>`).join('')}
                </ul>
                <div style="font-size: 0.7rem; color: #7e7e8c;"><i class="far fa-calendar-alt"></i> ${alb.release}</div>
            </div>`;
        }).join('');
    }

    // 渲染Bubble入口
    function renderBubbleEntries() {
        const grid = document.getElementById('bubbleMembersGrid');
        if (!grid) return;
        grid.innerHTML = bubbleMembers.map(m => `
            <a href="bubble/${m.file}" class="bubble-entry-card">
                <div class="bubble-avatar" style="border-color: ${m.color}80; border: 2px solid ${m.color}80;">
                    <i class="${m.icon}" style="font-size: 3rem; color: ${m.color};"></i>
                </div>
                <div class="bubble-name">${m.name}</div>
                <div class="bubble-stage">${m.stageName}</div>
                <div class="bubble-desc">${m.desc}</div>
                <div style="margin-top: 1rem; font-size: 0.7rem; color: #7c3aed;">💬 点击对话 →</div>
            </a>
        `).join('');
    }

    // 初始化
    renderMembers();
    renderAlbums();
    renderBubbleEntries();
</script>
</body>
</html>
